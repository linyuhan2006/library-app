<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书借阅小程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="user-section">
            <div id="user-status" class="user-status">
                <span id="welcome-message">欢迎</span>
                <button id="login-btn" class="login-btn">登录</button>
                <button id="register-btn" class="register-btn">注册</button>
                <button id="logout-btn" class="logout-btn" style="display: none;">退出</button>
            </div>
        </div>
        
        <h1>图书借阅小程序</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" data-tab="search">图书搜索</button>
            <button class="tab-btn" data-tab="borrowed">借阅记录</button>
            <button class="tab-btn" data-tab="add">添加图书</button>
        </div>
        
        <!-- 登录模态框 -->
        <div id="login-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>用户登录</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="用户名" required>
                    <input type="password" id="login-password" placeholder="密码" required>
                    <button type="submit">登录</button>
                </form>
            </div>
        </div>
        
        <!-- 注册模态框 -->
        <div id="register-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>用户注册</h2>
                <form id="register-form">
                    <input type="text" id="register-username" placeholder="用户名" required>
                    <input type="password" id="register-password" placeholder="密码" required>
                    <input type="password" id="register-confirm-password" placeholder="确认密码" required>
                    <button type="submit">注册</button>
                </form>
            </div>
        </div>
        
        <div class="tab-content" id="search">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="输入书名或作者">
                <select id="category-filter">
                    <option value="all">全部分类</option>
                    <option value="计算机">计算机</option>
                    <option value="文学">文学</option>
                    <option value="历史">历史</option>
                    <option value="哲学">哲学</option>
                    <option value="其他">其他</option>
                </select>
                <button id="search-btn">搜索</button>
            </div>
            <div id="search-results"></div>
        </div>
        
        <div class="tab-content" id="borrowed" style="display: none;">
            <h2>我的借阅记录</h2>
            <div id="borrowed-list"></div>
        </div>
        
        <div class="tab-content" id="add" style="display: none;">
            <h2>添加图书</h2>
            <form id="add-book-form">
                <input type="text" id="book-title" placeholder="书名" required>
                <input type="text" id="book-author" placeholder="作者" required>
                <input type="text" id="book-isbn" placeholder="ISBN" required>
                <select id="book-category" required>
                    <option value="">选择分类</option>
                    <option value="计算机">计算机</option>
                    <option value="文学">文学</option>
                    <option value="历史">历史</option>
                    <option value="哲学">哲学</option>
                    <option value="其他">其他</option>
                </select>
                <input type="file" id="book-cover" accept="image/*">
                <button type="submit">添加</button>
            </form>
        </div>
        
        <!-- 图书详情页面 -->
        <div class="tab-content" id="detail" style="display: none;">
            <h2>图书详情</h2>
            <div id="book-detail" class="book-detail">
                <button id="back-btn" class="back-btn">返回</button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
